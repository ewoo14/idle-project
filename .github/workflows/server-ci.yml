name: server-ci

on:
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"
  push:
    branches: [main]
    paths:
      - "server/**"

jobs:
  lint-build-test:
    name: lint / build / test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: idle
          POSTGRES_PASSWORD: change_me_local_only
          POSTGRES_DB: idle
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U idle -d idle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Detect server scaffold
        id: detect
        shell: bash
        run: |
          if [[ -f "server/package.json" ]]; then
            echo "scaffolded=true" >> "$GITHUB_OUTPUT"
          else
            echo "scaffolded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.detect.outputs.scaffolded == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install
        if: steps.detect.outputs.scaffolded == 'true'
        working-directory: server
        run: npm ci

      - name: Lint
        if: steps.detect.outputs.scaffolded == 'true'
        working-directory: server
        run: npm run lint --if-present

      - name: Build
        if: steps.detect.outputs.scaffolded == 'true'
        working-directory: server
        run: npm run build --if-present

      - name: Test
        if: steps.detect.outputs.scaffolded == 'true'
        working-directory: server
        env:
          DATABASE_URL: postgres://idle:change_me_local_only@localhost:5432/idle
          REDIS_URL: redis://localhost:6379
          JWT_PRIVATE_KEY_PATH: /tmp/jwt_private.pem
          JWT_PUBLIC_KEY_PATH: /tmp/jwt_public.pem
          JWT_KEY_ID: v1
        run: |
          openssl genrsa -out /tmp/jwt_private.pem 2048
          openssl rsa -in /tmp/jwt_private.pem -pubout -out /tmp/jwt_public.pem
          npm test --if-present

      - name: Skip notice (server 아직 스캐폴드 전)
        if: steps.detect.outputs.scaffolded == 'false'
        run: |
          echo "server/ 가 아직 스캐폴드되지 않아 단계를 건너뜁니다. (PR 7 머지 이후 정상 동작)"
