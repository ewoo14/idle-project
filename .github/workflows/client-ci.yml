name: client-ci

# UE5 헤드리스 빌드는 무거우므로 PR 라벨 `build/client` 또는 main push 시에만 실행.
# M1 클라이언트 슬라이스 머지 이후 실제 빌드 단계 활성화 예정.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]
    paths:
      - "client/**"

jobs:
  guard:
    name: guard (라벨/파일 조건)
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - id: decide
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ contains(github.event.pull_request.labels.*.name, 'build/client') }}" == "true" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  ue5-build:
    name: UE5 헤드리스 빌드 (placeholder)
    needs: guard
    if: needs.guard.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: 안내
        run: |
          Write-Host "GitHub-hosted 러너엔 UE5 가 없어 실제 빌드/Automation 불가(placeholder)."
          Write-Host "실 검증은 self-hosted 러너 job 'UE5 Automation (self-hosted)' 또는"
          Write-Host "로컬 게이트 'tools/ci/ue-automation.ps1' 로 수행합니다(docs/ops/ue-automation-ci.md)."

  # UE5 표준 jumbo 빌드 + Automation 실검증 (UE 설치된 self-hosted Windows 러너 필요).
  # 러너 미등록 상태에서 PR 가 막히지 않도록 라벨 'ue/automation' 게이트.
  # 러너 등록 후 docs/ops/ue-automation-ci.md 절차대로 활성화.
  ue5-automation:
    name: UE5 Automation (self-hosted)
    if: ${{ contains(github.event.pull_request.labels.*.name, 'ue/automation') }}
    runs-on: [self-hosted, windows, ue5]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: UE Automation 게이트 (표준 jumbo 빌드 + 전체 IdleProject)
        shell: pwsh
        run: ./tools/ci/ue-automation.ps1
